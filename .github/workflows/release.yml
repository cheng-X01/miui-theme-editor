# GitHub Actions CI/CD 工作流 - 自动构建并发布 Electron 应用
# 触发条件：推送以 v 开头的标签时触发（如 v0.1.0）
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 构建任务 - 使用矩阵策略在三个平台并行构建
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # 步骤 1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 步骤 3：安装依赖
      - name: Install dependencies
        run: npm ci

      # 步骤 4：构建渲染进程和主进程
      - name: Build renderer and main
        run: |
          npm run build:renderer
          npm run build:main

      # 步骤 5：构建 Electron 应用
      - name: Build Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 6：构建 Linux arm64 版本（交叉编译）
      - name: Build Linux arm64
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 7：上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.tar.gz
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

      # 步骤 8：上传 Linux arm64 产物
      - name: Upload Linux arm64 artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist-ubuntu-arm64
          path: |
            release/*arm64.AppImage
            release/*arm64.deb
          if-no-files-found: ignore

  # 发布任务 - 收集所有平台产物并创建 GitHub Release
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 步骤 1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2：下载所有构建产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 步骤 3：列出产物文件
      - name: List artifacts
        run: |
          echo "构建产物列表："
          find artifacts -type f | sort

      # 步骤 4：创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 5：同步到 Gitee Release（国内下载加速）
      - name: Sync to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN not configured, skipping Gitee sync"
            exit 0
          fi

          TAG="${GITHUB_REF#refs/tags/}"
          REPO="cheng1992/miui-theme-editor-releases"
          GITEE_API="https://gitee.com/api/v5"

          # 1. 创建或获取 Gitee Release
          RELEASE_RESP=$(curl -s -X POST "${GITEE_API}/repos/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"MIUI Theme Editor ${TAG}\",\"body\":\"自动同步自 GitHub Releases\",\"prerelease\":false}")
          RELEASE_ID=$(echo "$RELEASE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

          if [ -z "$RELEASE_ID" ]; then
            # Release 可能已存在，尝试获取
            RELEASE_RESP=$(curl -s "${GITEE_API}/repos/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
            RELEASE_ID=$(echo "$RELEASE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create or get Gitee Release"
            exit 1
          fi

          echo "Gitee Release ID: $RELEASE_ID"

          # 2. 上传所有产物到 Gitee Release
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading $filename ..."
              curl -s -X POST "${GITEE_API}/repos/${REPO}/releases/${RELEASE_ID}/attach_files" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "file=@${file}"
              echo ""
            fi
          done

          echo "Gitee Release sync completed: https://gitee.com/${REPO}/releases/${TAG}"
