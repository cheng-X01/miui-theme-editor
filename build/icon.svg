<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 定义渐变 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="64" y="64" width="896" height="896" rx="192" ry="192" fill="url(#bgGrad)"/>

  <!-- 白色 M 字母 -->
  <text x="512" y="680" font-family="Arial, Helvetica, sans-serif" font-size="560" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">M</text>
</svg>
